name: Build and Publish Docker Image

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  IMAGE_TAG: 1.0.0

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar Código
        uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Construir Imagen
        run: |
          docker build \
          -t ghcr.io/themesenjer/calendario-2026-devops:${{ env.IMAGE_TAG }} \
          -t ghcr.io/themesenjer/calendario-2026-devops:latest \
          .

      - name: Publicar Imagen
        run: |
          docker push ghcr.io/themesenjer/calendario-2026-devops:${{ env.IMAGE_TAG }}
          docker push ghcr.io/themesenjer/calendario-2026-devops:latest