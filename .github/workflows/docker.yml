name: Build and Publish Docker Image

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  IMAGE_TAG: 3.0.0

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar Código
        uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Construir Imagen
        run: |
          docker build \
            -t ghcr.io/themesenjer/calendario-2026-devops:${{ env.IMAGE_TAG }} \
            -t ghcr.io/themesenjer/calendario-2026-devops:latest \
            .

      - name: Publicar Imagen
        run: |
          docker push ghcr.io/themesenjer/calendario-2026-devops:${{ env.IMAGE_TAG }}
          docker push ghcr.io/themesenjer/calendario-2026-devops:latest

      - name: Verificar secretos
        run: |
          echo "HOST:"
          echo "${{ secrets.VPS_HOST }}" | wc -c

          echo "USER:"
          echo "${{ secrets.VPS_USER }}" | wc -c

          echo "PORT:"
          echo "${{ secrets.VPS_SSH_PORT }}" | wc -c
##prueba 
      - name: Probar SSH en VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_SSH_PORT }}
          timeout: 60s
          command_timeout: 10m
          script: |
            echo "===== CONEXION EXITOSA ====="
            hostname
            whoami
            pwd
            docker --version
            docker ps