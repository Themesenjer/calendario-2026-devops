name: Build and Publish Docker Image

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  IMAGE_TAG: 2.0.0

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar Código
        uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Construir Imagen
        run: |
          docker build \
          -t ghcr.io/themesenjer/calendario-2026-devops:${{ env.IMAGE_TAG }} \
          -t ghcr.io/themesenjer/calendario-2026-devops:latest \
          .

      - name: Publicar Imagen
        run: |
          docker push ghcr.io/themesenjer/calendario-2026-devops:${{ env.IMAGE_TAG }}
          docker push ghcr.io/themesenjer/calendario-2026-devops:latest

      - name: Mostrar variables (solo locales,no secretos)
        run: |
          echo "Probando conexion SSH con:"
          echo "Host: ${{ secrets.VPS_HOST }}"
          echo "Usuario: ${{ secrets.VPS_USER }}"
          echo "Puerto: ${{ secrets.VPS_SHH_PORT }}"
          echo "Password: ${{ secrets.VPS_PASSWORD }}"
        
      - name: Probar la shh en el vps
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_SHH_PORT }}
          script: |
            echo "Probando conexion SSH en el VPS"
            hostname
            whoami
            uptime